<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280">
  <style>
    text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', 'Monaco', monospace; }
  </style>
  <!-- Window frame -->
  <rect x="0" y="0" width="720" height="280" rx="10" ry="10" fill="#1a1b26"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="38" rx="10" ry="10" fill="#24283b"/>
  <rect x="0" y="28" width="720" height="10" fill="#24283b"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="360" y="24" fill="#787c99" font-size="13" text-anchor="middle">sound-of-silence demo</text>

  <!-- Terminal content -->
  <text x="16" y="68" fill="#7aa2f7" font-size="14">~</text>
  <text x="36" y="68" fill="#a9b1d6" font-size="14">$ echo "Hello, this text was spoken"</text>

  <text x="16" y="92" fill="#a9b1d6" font-size="14">Hello, this text was spoken</text>

  <text x="16" y="120" fill="#7aa2f7" font-size="14">~</text>
  <text x="36" y="120" fill="#a9b1d6" font-size="14">$ sound-of-silence status</text>

  <text x="16" y="144" fill="#9ece6a" font-size="14">recording</text>

  <text x="16" y="172" fill="#7aa2f7" font-size="14">~</text>
  <text x="36" y="172" fill="#a9b1d6" font-size="14">$</text>
  <!-- Blinking cursor -->
  <rect x="50" y="160" width="9" height="17" fill="#c0caf5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Status bar background -->
  <rect x="0" y="240" width="720" height="40" rx="0" ry="0" fill="#1f2335"/>
  <rect x="0" y="270" width="720" height="10" rx="0" ry="10" fill="#1f2335"/>

  <!-- Recording indicator in status bar -->
  <!-- Red recording dot with pulse animation -->
  <circle cx="560" cy="258" r="5" fill="#ff4444">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="572" y="263" fill="#e0e0e0" font-size="14">Recording...</text>
  <text x="672" y="263" fill="#47FF9C" font-size="14" font-weight="bold">0:03</text>

  <!-- Keybinding hint -->
  <rect x="14" y="249" width="120" height="20" rx="4" ry="4" fill="#292e42"/>
  <text x="24" y="263" fill="#565f89" font-size="11">Cmd+Shift+V</text>
</svg>
